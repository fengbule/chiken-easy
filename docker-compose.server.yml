services:
  chiken-server:
    build: .
    image: chiken-easy:latest
    container_name: chiken-server
    restart: unless-stopped
    environment:
      PORT: "7788"
      CHIKEN_BOOTSTRAP_TOKEN: "${CHIKEN_BOOTSTRAP_TOKEN}"
      CHIKEN_API_TOKEN: "${CHIKEN_API_TOKEN:-}"
    ports:
      - "7788:7788"
    volumes:
      - chiken-data:/app/data

  chiken-singbox:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: chiken-singbox
    restart: unless-stopped
    network_mode: host
    command: ["run", "-c", "/etc/sing-box/config.json"]
    volumes:
      - ./data/sing-box:/etc/sing-box

  chiken-agent:
    image: chiken-easy:latest
    container_name: chiken-agent
    restart: unless-stopped
    command: ["node", "agent/index.js"]
    depends_on:
      - chiken-server
      - chiken-singbox
    environment:
      CHIKEN_SERVER: "ws://chiken-server:7788/agent"
      CHIKEN_TOKEN: "${CHIKEN_BOOTSTRAP_TOKEN}"
      CHIKEN_AGENT_NAME: "${CHIKEN_AGENT_NAME:-main}"
      CHIKEN_AGENT_HOST: "${CHIKEN_AGENT_HOST:-main}"
      CHIKEN_AGENT_IP: "${CHIKEN_AGENT_IP:-}"
      CHIKEN_SERVICE_MODE: docker
      CHIKEN_HOST_PROC: /host/proc
      SINGBOX_CONTAINER: chiken-singbox
      SINGBOX_CONFIG_VOLUME: ${PWD}/data/sing-box
      SINGBOX_CONFIG: /etc/sing-box/config.json
      CHIKEN_FORWARDER_DIR: /app/forwarders
      CHIKEN_FORWARDER_HOST_DIR: ${PWD}/data/forwarders
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - chiken-agent-state:/app/agent-state
      - ./data/sing-box:/etc/sing-box
      - ./data/forwarders:/app/forwarders

volumes:
  chiken-data:
  chiken-agent-state:
